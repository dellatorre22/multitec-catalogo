<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multitec Distribuição - Início</title>
    <style>
        :root {
            --bg-body: #161616;
            --text-primary: #E0E0E0;
            --text-secondary: #B0B0B0;
            --accent-red: #D31212;
            --border-color: #333333;
            --whatsapp-green: #25D366;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-body);
            color: var(--text-primary);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }
        header {
            padding: 40px 50px 10px 50px;
            display: flex;
            justify-content: flex-start;
            width: 100%;
            background-color: var(--bg-body);
        }
        .logo {
            max-width: 250px;
            max-height: 80px;
            object-fit: contain;
        }
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 50px 60px 50px;
        }
        .hero-split {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1200px;
            width: 100%;
            gap: 50px;
        }
        .hero-text {
            flex: 1;
            max-width: 550px;
            animation: fadeInLeft 1s ease-out;
        }
        .hero-title {
            font-size: 3.2rem;
            color: #FFFFFF;
            line-height: 1.2;
            margin-bottom: 20px;
        }
        .hero-subtitle {
            font-size: 1.25rem;
            color: var(--text-secondary);
            margin-bottom: 45px;
            max-width: 480px;
        }
        .btn-entrar {
            display: inline-block;
            background-color: var(--accent-red);
            color: #FFFFFF;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 20px 45px;
            border-radius: 8px;
            transition: transform 0.2s, background-color 0.3s, box-shadow 0.3s;
            box-shadow: 0 0 15px rgba(211, 18, 18, 0.4);
            animation: pulse 2s infinite;
        }
        .btn-entrar:hover {
            background-color: #A01010;
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 15px 30px rgba(211, 18, 18, 0.6);
            animation: none;
        }
        .hero-image-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            animation: fadeInRight 1s ease-out;
        }
        .floating-img {
            max-width: 100%;
            height: auto;
            max-height: 400px;
            object-fit: contain;
            filter: drop-shadow(0px 20px 40px rgba(0, 0, 0, 0.7));
            animation: float 4s ease-in-out infinite;
        }
        .stats-container {
            display: flex;
            gap: 20px;
            margin-top: 30px;
        }
        .stat-box {
            background-color: #1f1f1f;
            padding: 15px 20px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }
        .stat-number {
            font-size: 1.5rem;
            color: #FFFFFF;
            font-weight: bold;
            display: block;
        }
        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        footer {
            padding: 30px 50px;
            text-align: center;
            border-top: 1px solid var(--border-color);
            background-color: var(--bg-body);
        }
        .features {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 30px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .feature-item {
            font-size: 1rem;
            color: var(--text-secondary);
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .whatsapp-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: var(--whatsapp-green);
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s;
            z-index: 1000;
            text-decoration: none;
        }
        .whatsapp-btn:hover {
            transform: scale(1.1);
        }
        .whatsapp-btn svg {
            width: 35px;
            height: 35px;
            fill: currentColor;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(211, 18, 18, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(211, 18, 18, 0); }
            100% { box-shadow: 0 0 0 0 rgba(211, 18, 18, 0); }
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
        @keyframes fadeInLeft {
            from { opacity: 0; transform: translateX(-50px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes fadeInRight {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @media (max-width: 900px) {
            header { padding: 20px; justify-content: center; }
            .logo { max-width: 180px; }
            main { padding: 20px 20px 50px 20px; }
            .hero-split { flex-direction: column-reverse; text-align: center; gap: 40px; }
            .hero-title { font-size: 2.2rem; }
            .hero-subtitle { font-size: 1.1rem; margin: 0 auto 40px auto; }
            .stats-container { justify-content: center; }
            .floating-img { max-width: 280px; }
            .features { flex-direction: column; gap: 15px; align-items: center; }
            .whatsapp-btn { bottom: 20px; right: 20px; width: 50px; height: 50px; }
            .whatsapp-btn svg { width: 30px; height: 30px; }
        }
    </style>
</head>
<body>
    <header>
        <img src="logo-multitec.png" alt="Logo" class="logo" onerror="this.style.display='none';">
    </header>
    <main>
        <div class="hero-split">
            <div class="hero-text">
                <h1 class="hero-title">O Maior Catálogo de Eletrônicos de Palmas</h1>
                <p class="hero-subtitle">Confira preços, novidades e disponibilidade de estoque em tempo real.</p>
                <a href="catalogo.html" class="btn-entrar">Acessar Catálogo Online</a>
                <div class="stats-container">
                    <div class="stat-box">
                        <span class="stat-number">+1600</span>
                        <span class="stat-label">Produtos no Catálogo</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-number">45%</span>
                        <span class="stat-label">Estoque Atualizado</span>
                    </div>
                </div>
            </div>
            <div class="hero-image-container">
                <img src="fotos/airpods4.png" alt="Destaque" class="floating-img" onerror="this.style.display='none';">
            </div>
        </div>
    </main>
    <footer>
        <div class="features">
            <span class="feature-item"> Loja Física na 104 Sul</span>
            <span class="feature-item"> Assistência Autorizada Apple</span>
            <span class="feature-item"> Dellatorre mexendo nesse catalogo 24hrs</span>
        </div>
    </footer>

</body>
</html>
